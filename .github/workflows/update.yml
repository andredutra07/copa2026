name: Atualizar previsões Copa 2026

on:
  schedule:
    - cron: "0 * * * *"

  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: atualizar-copa
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar ciclo (coleta -> calibra -> simula -> publica)
        env:
          SIMS: "20000"
        run: python engine/run_update.py

      - name: Commitar atualização
        run: |
          git config user.name  "copa2026-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/ docs/predictions.json
          if git diff --cached --quiet; then
            echo "Nada mudou nesta rodada."
          else
            git commit -m "Atualizacao automatica $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
